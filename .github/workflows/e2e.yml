name: E2E Test Suite — User Management API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: E2E Tests — ${{ matrix.env }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull and start API container
        run: |
          docker pull ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
          docker run -d -p 3000:3000 --name api ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000/${{ matrix.env }}/users; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting... attempt $i"
            sleep 2
          done
          echo "API failed to start after 60s" && exit 1

      - name: Run E2E tests — ${{ matrix.env }}
        run: |
          mkdir -p reports
          pytest tests/ --env=${{ matrix.env }} \
            --html=reports/report-${{ matrix.env }}.html \
            --self-contained-html \
            -v

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.env }}
          path: reports/report-${{ matrix.env }}.html